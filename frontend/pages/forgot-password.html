<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci minha senha — FinWise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-box { width: 100%; max-width: 400px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo h1 { font-size: 28px; font-weight: 700; color: var(--primary-light); }
    .auth-logo p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .auth-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .auth-card p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="auth-logo">
      <h1>💰 FinWise</h1>
      <p>Sua vida financeira sob controle</p>
    </div>

    <div class="auth-card">
      <h2>Esqueci minha senha</h2>
      <p>Digite seu email e enviaremos um link para redefinir sua senha.</p>

      <div id="formError" class="alert alert-error hidden"></div>
      <div id="formSuccess" class="alert alert-success hidden"></div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="submitBtn" onclick="sendReset()">
        Enviar link de redefinição
      </button>
    </div>

    <div class="auth-footer">
      Lembrou a senha? <a href="login.html">Voltar ao login</a>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    async function sendReset() {
      const btn = document.getElementById('submitBtn');
      const error = document.getElementById('formError');
      const success = document.getElementById('formSuccess');
      const email = document.getElementById('email').value.trim();

      if (!email) {
        error.textContent = 'Digite seu email.';
        error.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';
      error.classList.add('hidden');
      success.classList.add('hidden');

      try {
        const res = await fetch('http://127.0.0.1:8000/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail);
        success.textContent = '✅ Email enviado! Verifique sua caixa de entrada.';
        success.classList.remove('hidden');
      } catch (err) {
        error.textContent = err.message;
        error.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Enviar link de redefinição';
      }
    }
  </script>
</body>
</html>
