<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias — FinWise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <style>
    .categories-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .categories-section {
      margin-bottom: 32px;
    }

    .categories-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .category-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .category-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .category-name {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .category-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .icon-btn:hover { opacity: 1; }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 440px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-header h2 { font-size: 18px; font-weight: 600; }
    .close-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }

    .type-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .type-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .type-btn.active-income {
      background: rgba(34,197,94,0.15);
      border-color: var(--success);
      color: var(--success);
    }

    .type-btn.active-expense {
      background: rgba(239,68,68,0.15);
      border-color: var(--danger);
      color: var(--danger);
    }

    .icon-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .icon-option {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-input);
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s;
    }

    .icon-option.selected {
      border-color: var(--primary);
      background: rgba(99,102,241,0.15);
    }

    .color-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .color-option {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.2s;
    }

    .color-option.selected {
      border-color: var(--text);
      transform: scale(1.1);
    }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">💰 FinWise</div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
      <a href="transactions.html" class="nav-item">💸 Transações</a>
      <a href="categories.html" class="nav-item active">🏷️ Categorias</a>
      <a href="goals.html" class="nav-item">🎯 Metas</a>
      <a href="debts.html" class="nav-item">💳 Dívidas</a>
      <a href="ai-chat.html" class="nav-item">🤖 FinBot IA</a>
    </nav>
    <div class="sidebar-footer">
      <span id="userName" class="text-muted"></span>
      <button onclick="Auth.logout()" class="btn btn-ghost btn-sm">Sair</button>
    </div>
  </aside>

  <main class="main">
    <div class="categories-header">
      <h1>Categorias</h1>
      <button class="btn btn-primary" onclick="openModal()">+ Nova categoria</button>
    </div>

    <div class="categories-section">
      <p class="categories-section-title">Receitas</p>
      <div class="categories-grid" id="incomeCategories">
        <p class="text-muted text-center">Carregando...</p>
      </div>
    </div>

    <div class="categories-section">
      <p class="categories-section-title">Despesas</p>
      <div class="categories-grid" id="expenseCategories">
        <p class="text-muted text-center">Carregando...</p>
      </div>
    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Nova categoria</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>

      <div class="type-toggle">
        <button class="type-btn active-income" id="btnIncome" onclick="setType('income')">📈 Receita</button>
        <button class="type-btn" id="btnExpense" onclick="setType('expense')">📉 Despesa</button>
      </div>

      <div id="formError" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="catName" placeholder="Ex: Pets, Viagem...">
      </div>

      <div class="form-group">
        <label>Ícone</label>
        <div class="icon-picker" id="iconPicker"></div>
      </div>

      <div class="form-group">
        <label>Cor</label>
        <div class="color-picker" id="colorPicker"></div>
      </div>

      <input type="hidden" id="editingId">

      <button class="btn btn-primary btn-full" id="saveBtn" onclick="saveCategory()">
        Salvar categoria
      </button>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/categories.js"></script>
</body>
</html>
