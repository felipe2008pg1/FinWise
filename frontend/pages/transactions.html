<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transações — FinWise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <style>
    .transactions-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .filters select {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-header h2 {
      font-size: 18px;
      font-weight: 600;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
    }

    .type-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .type-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .type-btn.active-income {
      background: rgba(34,197,94,0.15);
      border-color: var(--success);
      color: var(--success);
    }

    .type-btn.active-expense {
      background: rgba(239,68,68,0.15);
      border-color: var(--danger);
      color: var(--danger);
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      transition: color 0.2s;
    }

    .delete-btn:hover { color: var(--danger); }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
    }

    .empty-state p { font-size: 32px; margin-bottom: 8px; }
  </style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">💰 FinWise</div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
      <a href="transactions.html" class="nav-item active">💸 Transações</a>
      <a href="goals.html" class="nav-item">🎯 Metas</a>
      <a href="debts.html" class="nav-item">💳 Dívidas</a>
      <a href="ai-chat.html" class="nav-item">🤖 FinBot IA</a>
    </nav>
    <div class="sidebar-footer">
      <span id="userName" class="text-muted"></span>
      <button onclick="Auth.logout()" class="btn btn-ghost btn-sm">Sair</button>
    </div>
  </aside>

  <main class="main">
    <div class="transactions-header">
      <h1>Transações</h1>
      <button class="btn btn-primary" onclick="openModal()">+ Nova transação</button>
    </div>

    <div class="filters">
      <select id="filterType" onchange="renderTransactions()">
        <option value="all">Todos</option>
        <option value="income">Receitas</option>
        <option value="expense">Despesas</option>
      </select>
      <select id="filterCategory" onchange="renderTransactions()">
        <option value="all">Todas categorias</option>
      </select>
    </div>

    <div class="card">
      <div id="transactionsList">
        <p class="text-muted text-center">Carregando...</p>
      </div>
    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Nova transação</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>

      <div class="type-toggle">
        <button class="type-btn active-income" id="btnIncome" onclick="setType('income')">📈 Receita</button>
        <button class="type-btn" id="btnExpense" onclick="setType('expense')">📉 Despesa</button>
      </div>

      <div id="formError" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label>Título</label>
        <input type="text" id="txTitle" placeholder="Ex: Salário, Aluguel...">
      </div>
      <div class="form-group">
        <label>Valor (R$)</label>
        <input type="number" id="txAmount" placeholder="0,00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="txDate">
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="txCategory">
          <option value="">Sem categoria</option>
        </select>
      </div>
      <div class="form-group">
        <label>Observações</label>
        <input type="text" id="txNotes" placeholder="Opcional">
      </div>

      <button class="btn btn-primary btn-full" id="saveBtn" onclick="saveTransaction()">
        Salvar
      </button>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/transactions.js"></script>
</body>
</html>
